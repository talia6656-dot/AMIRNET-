<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AmirNET Pro — הרשמה</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy: #0a1628; --blue: #1a56db; --blue-light: #3b82f6;
    --accent: #f59e0b; --white: #ffffff; --gray-400: #94a3b8;
  }
  body {
    font-family: 'Heebo', sans-serif; background: var(--navy);
    min-height: 100vh; display: flex; align-items: center;
    justify-content: center; padding: 1.5rem; position: relative; overflow: hidden;
  }
  body::before {
    content: ''; position: fixed; top: -30%; right: -20%;
    width: 65vw; height: 65vw; border-radius: 50%;
    background: radial-gradient(circle, rgba(245,158,11,0.1) 0%, transparent 70%);
    pointer-events: none;
  }
  body::after {
    content: ''; position: fixed; bottom: -20%; left: -10%;
    width: 50vw; height: 50vw; border-radius: 50%;
    background: radial-gradient(circle, rgba(26,86,219,0.12) 0%, transparent 70%);
    pointer-events: none;
  }
  .container { width: 100%; max-width: 460px; position: relative; z-index: 1; }
  .logo-wrap { text-align: center; margin-bottom: 1.75rem; animation: fadeDown 0.6s ease both; }
  .logo { font-family: 'DM Serif Display', serif; font-size: 2.2rem; color: var(--white); }
  .logo span { color: var(--accent); }
  .logo-sub { font-size: 13px; color: var(--gray-400); margin-top: 4px; }
  .card {
    background: rgba(255,255,255,0.04); backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.1); border-radius: 20px;
    padding: 2.25rem 2rem; animation: fadeUp 0.6s ease 0.1s both;
  }
  .card-title { font-size: 20px; font-weight: 600; color: var(--white); margin-bottom: 0.3rem; }
  .card-sub { font-size: 13.5px; color: var(--gray-400); margin-bottom: 1.75rem; line-height: 1.6; }
  .field-code {
    background: rgba(245,158,11,0.07); border: 1px solid rgba(245,158,11,0.25);
    border-radius: 12px; padding: 14px; margin-bottom: 1.25rem;
  }
  .field-code label {
    display: flex; align-items: center; gap: 7px;
    font-size: 13px; font-weight: 600; color: var(--accent); margin-bottom: 7px;
  }
  .field-code label::before { content: '🔑'; font-size: 14px; }
  .field-code input {
    width: 100%; padding: 10px 12px;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(245,158,11,0.3);
    border-radius: 8px; font-family: 'Heebo', sans-serif; font-size: 15px;
    font-weight: 600; color: var(--white); letter-spacing: 2px;
    text-align: center; outline: none; transition: border-color 0.15s; direction: ltr;
  }
  .field-code input:focus { border-color: var(--accent); }
  .field-code input::placeholder { letter-spacing: 0; font-weight: 400; color: rgba(255,255,255,0.2); }
  .code-hint { font-size: 11.5px; color: rgba(245,158,11,0.6); margin-top: 6px; text-align: right; }
  .fields-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1rem; }
  .field { margin-bottom: 1rem; }
  .field label { display: block; font-size: 13px; font-weight: 500; color: var(--gray-400); margin-bottom: 6px; }
  .field input {
    width: 100%; padding: 11px 13px;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px; font-family: 'Heebo', sans-serif; font-size: 15px;
    color: var(--white); outline: none; transition: border-color 0.15s, background 0.15s;
    text-align: right; direction: rtl;
  }
  .field input[type="email"], .field input[type="password"] { direction: ltr; text-align: left; }
  .field input::placeholder { color: rgba(255,255,255,0.2); }
  .field input:focus { border-color: var(--blue-light); background: rgba(255,255,255,0.09); }
  .strength-bar { height: 3px; background: rgba(255,255,255,0.1); border-radius: 999px; margin-top: 6px; overflow: hidden; }
  .strength-fill { height: 100%; border-radius: 999px; width: 0%; transition: width 0.3s, background 0.3s; }
  .strength-label { font-size: 11px; color: var(--gray-400); margin-top: 4px; text-align: left; min-height: 14px; }
  .global-error {
    display: none; background: rgba(220,38,38,0.1); border: 1px solid rgba(220,38,38,0.3);
    border-radius: 10px; padding: 11px 13px; font-size: 13px;
    color: #fca5a5; margin-bottom: 1rem;
  }
  .global-error.show { display: block; }
  .btn-primary {
    width: 100%; padding: 13px; background: var(--blue); border: none;
    border-radius: 10px; font-family: 'Heebo', sans-serif; font-size: 15px;
    font-weight: 600; color: var(--white); cursor: pointer;
    transition: background 0.15s, transform 0.1s; margin-top: 0.25rem;
  }
  .btn-primary:hover { background: #1d4ed8; }
  .btn-primary:active { transform: scale(0.98); }
  .btn-primary.loading { pointer-events: none; opacity: 0.7; }
  .login-prompt { text-align: center; font-size: 13.5px; color: var(--gray-400); margin-top: 1.25rem; }
  .login-prompt a { color: var(--accent); text-decoration: none; font-weight: 600; }
  .success-screen { display: none; text-align: center; padding: 1rem 0; }
  .success-screen.show { display: block; }
  .success-icon { font-size: 3rem; margin-bottom: 1rem; }
  .success-screen h2 { font-size: 20px; color: var(--white); margin-bottom: 0.5rem; }
  .success-screen p { font-size: 14px; color: var(--gray-400); line-height: 1.7; margin-bottom: 1.5rem; }
  @keyframes fadeDown { from { opacity:0; transform:translateY(-16px); } to { opacity:1; transform:translateY(0); } }
  @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
</style>
</head>
<body>
<div class="container">
  <div class="logo-wrap">
    <div class="logo">Amir<span>NET</span> Pro</div>
    <div class="logo-sub">פלטפורמת הכנה לבחינת האמיר</div>
  </div>
  <div class="card">
    <div id="register-form">
      <div class="card-title">יצירת חשבון חדש</div>
      <div class="card-sub">ברוך הבא! הזן את קוד ההזמנה שקיבלת מהמורה כדי להתחיל.</div>
      <div class="global-error" id="global-error"></div>
      <div class="field-code">
        <label>קוד הזמנה</label>
        <input type="text" id="invite-code" placeholder="הזן קוד" maxlength="20" oninput="this.value=this.value.toUpperCase()">
        <div class="code-hint">הקוד נמסר לך על ידי המורה שלך</div>
      </div>
      <div class="fields-row">
        <div class="field">
          <label>שם פרטי</label>
          <input type="text" id="first-name" placeholder="שם פרטי">
        </div>
        <div class="field">
          <label>שם משפחה</label>
          <input type="text" id="last-name" placeholder="שם משפחה">
        </div>
      </div>
      <div class="field">
        <label>כתובת אימייל</label>
        <input type="email" id="email" placeholder="example@email.com" autocomplete="email">
      </div>
      <div class="field">
        <label>סיסמה</label>
        <input type="password" id="password" placeholder="לפחות 8 תווים" oninput="checkStrength(this.value)" autocomplete="new-password">
        <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
        <div class="strength-label" id="strength-label"></div>
      </div>
      <div class="field" style="margin-bottom:1.25rem">
        <label>אימות סיסמה</label>
        <input type="password" id="password-confirm" placeholder="הזן את הסיסמה שוב" autocomplete="new-password">
      </div>
      <button class="btn-primary" id="register-btn" onclick="handleRegister()">יצירת חשבון</button>
      <div class="login-prompt">
        כבר יש לך חשבון? <a href="index.html">כניסה כאן</a>
      </div>
    </div>
    <div class="success-screen" id="success-screen">
      <div class="success-icon">🎉</div>
      <h2>החשבון נוצר בהצלחה!</h2>
      <p>ברוך הבא ל-AmirNET Pro.<br>מיד תועבר לדף הכניסה.</p>
      <button class="btn-primary" onclick="window.location.href='index.html'">כניסה לחשבון</button>
    </div>
  </div>
</div>
<script>
  const SUPABASE_URL = 'https://ivauncueyedwlthzylnt.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_BbdQ2HYYKcO4uxJbFT0JWw_k5nqO39G';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  function checkStrength(val) {
    const fill = document.getElementById('strength-fill');
    const label = document.getElementById('strength-label');
    if (!val) { fill.style.width='0%'; label.textContent=''; return; }
    let score = 0;
    if (val.length >= 8) score++;
    if (/[A-Z]/.test(val)) score++;
    if (/[0-9]/.test(val)) score++;
    if (/[^A-Za-z0-9]/.test(val)) score++;
    const configs = [
      {w:'25%',bg:'#ef4444',t:'חלשה'},
      {w:'50%',bg:'#f97316',t:'בינונית'},
      {w:'75%',bg:'#eab308',t:'טובה'},
      {w:'100%',bg:'#22c55e',t:'חזקה'},
    ];
    const c = configs[score-1] || {w:'0%',bg:'transparent',t:''};
    fill.style.width=c.w; fill.style.background=c.bg;
    label.textContent=c.t; label.style.color=c.bg;
  }

  async function handleRegister() {
    const code = document.getElementById('invite-code').value.trim();
    const firstName = document.getElementById('first-name').value.trim();
    const lastName = document.getElementById('last-name').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const confirm = document.getElementById('password-confirm').value;
    const btn = document.getElementById('register-btn');
    const globalErr = document.getElementById('global-error');

    globalErr.classList.remove('show');

    if (!code || !firstName || !lastName || !email || !password || !confirm) {
      globalErr.textContent = 'אנא מלא את כל השדות.'; globalErr.classList.add('show'); return;
    }
    if (!email.includes('@')) {
      globalErr.textContent = 'כתובת האימייל אינה תקינה.'; globalErr.classList.add('show'); return;
    }
    if (password.length < 8) {
      globalErr.textContent = 'הסיסמה חייבת להכיל לפחות 8 תווים.'; globalErr.classList.add('show'); return;
    }
    if (password !== confirm) {
      globalErr.textContent = 'הסיסמאות אינן תואמות.'; globalErr.classList.add('show'); return;
    }

    btn.textContent = 'בודק קוד הזמנה...'; btn.classList.add('loading');

    // 1. Validate invite code
    const { data: codeData, error: codeError } = await sb
      .from('invite_codes')
      .select('code, used_by')
      .eq('code', code)
      .single();

    if (codeError || !codeData) {
      btn.textContent = 'יצירת חשבון'; btn.classList.remove('loading');
      globalErr.textContent = 'קוד ההזמנה אינו תקין. אנא בדוק עם המורה שלך.';
      globalErr.classList.add('show'); return;
    }

    // Determine role based on invite code
    const isTeacher = (code === 'TEACHER-AMIR-2026');
    const role = isTeacher ? 'teacher' : 'student';

    btn.textContent = 'יוצר חשבון...';

    // 2. Sign up with Supabase Auth
    const { data: authData, error: authError } = await sb.auth.signUp({ email, password });

    if (authError) {
      btn.textContent = 'יצירת חשבון'; btn.classList.remove('loading');
      globalErr.textContent = authError.message.includes('already registered')
        ? 'כתובת אימייל זו כבר רשומה. נסה להיכנס.'
        : 'שגיאה ביצירת החשבון. אנא נסה שנית.';
      globalErr.classList.add('show'); return;
    }

    // 3. Create profile with role
    const userId = authData.user.id;
    await sb.from('profiles').insert({
      id: userId, first_name: firstName, last_name: lastName, email, role
    });

    // 4. Mark invite code as used (only for student codes)
    if (!isTeacher) {
      await sb.from('invite_codes').update({ used_by: userId }).eq('code', code);
    }

    // 5. Show success and redirect based on role
    document.getElementById('register-form').style.display = 'none';
    document.getElementById('success-screen').classList.add('show');
    setTimeout(() => {
      window.location.href = isTeacher ? 'amirnet-teacher.html' : 'index.html';
    }, 2500);
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') handleRegister(); });
</script>
</body>
</html>

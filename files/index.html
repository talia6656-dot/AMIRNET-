<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AmirNET Pro — כניסה</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy: #0a1628; --blue: #1a56db; --blue-light: #3b82f6;
    --accent: #f59e0b; --white: #ffffff; --gray-400: #94a3b8;
  }
  body {
    font-family: 'Heebo', sans-serif;
    background: var(--navy);
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 1.5rem; position: relative; overflow: hidden;
  }
  body::before {
    content: ''; position: fixed; top: -30%; left: -20%;
    width: 70vw; height: 70vw; border-radius: 50%;
    background: radial-gradient(circle, rgba(26,86,219,0.15) 0%, transparent 70%);
    pointer-events: none;
  }
  body::after {
    content: ''; position: fixed; bottom: -20%; right: -10%;
    width: 50vw; height: 50vw; border-radius: 50%;
    background: radial-gradient(circle, rgba(245,158,11,0.08) 0%, transparent 70%);
    pointer-events: none;
  }
  .container { width: 100%; max-width: 440px; position: relative; z-index: 1; }
  .logo-wrap { text-align: center; margin-bottom: 2rem; animation: fadeDown 0.6s ease both; }
  .logo { font-family: 'DM Serif Display', serif; font-size: 2.4rem; color: var(--white); }
  .logo span { color: var(--accent); }
  .logo-sub { font-size: 13px; color: var(--gray-400); margin-top: 4px; }
  .card {
    background: rgba(255,255,255,0.04); backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.1); border-radius: 20px;
    padding: 2.25rem 2rem; animation: fadeUp 0.6s ease 0.1s both;
  }
  .card-title { font-size: 20px; font-weight: 600; color: var(--white); margin-bottom: 0.35rem; }
  .card-sub { font-size: 13.5px; color: var(--gray-400); margin-bottom: 1.75rem; line-height: 1.6; }
  .field { margin-bottom: 1.1rem; }
  .field label { display: block; font-size: 13px; font-weight: 500; color: var(--gray-400); margin-bottom: 6px; }
  .field input {
    width: 100%; padding: 11px 14px;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px; font-family: 'Heebo', sans-serif; font-size: 15px;
    color: var(--white); outline: none; transition: border-color 0.15s, background 0.15s;
    direction: ltr; text-align: left;
  }
  .field input::placeholder { color: rgba(255,255,255,0.25); }
  .field input:focus { border-color: var(--blue-light); background: rgba(255,255,255,0.09); }
  .error-banner {
    display: none; background: rgba(220,38,38,0.1); border: 1px solid rgba(220,38,38,0.3);
    border-radius: 10px; padding: 11px 13px; font-size: 13px;
    color: #fca5a5; margin-bottom: 1rem;
  }
  .error-banner.show { display: block; }
  .btn-primary {
    width: 100%; padding: 13px; background: var(--blue); border: none;
    border-radius: 10px; font-family: 'Heebo', sans-serif; font-size: 15px;
    font-weight: 600; color: var(--white); cursor: pointer;
    margin-top: 0.5rem; transition: background 0.15s, transform 0.1s;
  }
  .btn-primary:hover { background: #1d4ed8; }
  .btn-primary:active { transform: scale(0.98); }
  .btn-primary.loading { pointer-events: none; opacity: 0.7; }
  .divider {
    display: flex; align-items: center; gap: 12px;
    margin: 1.5rem 0 1.25rem; color: rgba(255,255,255,0.2); font-size: 12px;
  }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.1); }
  .register-prompt { text-align: center; font-size: 13.5px; color: var(--gray-400); line-height: 1.7; }
  .register-prompt a { color: var(--accent); text-decoration: none; font-weight: 600; }
  .register-prompt a:hover { opacity: 0.8; }
  .teacher-link { text-align: center; margin-top: 1.5rem; animation: fadeUp 0.6s ease 0.25s both; }
  .teacher-link a { font-size: 12.5px; color: rgba(255,255,255,0.25); text-decoration: none; transition: color 0.15s; }
  .teacher-link a:hover { color: rgba(255,255,255,0.5); }
  @keyframes fadeDown { from { opacity:0; transform:translateY(-16px); } to { opacity:1; transform:translateY(0); } }
  @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
</style>
</head>
<body>
<div class="container">
  <div class="logo-wrap">
    <div class="logo">Amir<span>NET</span> Pro</div>
    <div class="logo-sub">פלטפורמת הכנה לבחינת האמיר</div>
  </div>
  <div class="card">
    <div class="card-title">ברוך הבא</div>
    <div class="card-sub">היכנס לחשבונך כדי להמשיך בתרגול</div>
    <div class="error-banner" id="error-banner"></div>
    <div class="field">
      <label>כתובת אימייל</label>
      <input type="email" id="email" placeholder="example@email.com" autocomplete="email">
    </div>
    <div class="field">
      <label>סיסמה</label>
      <input type="password" id="password" placeholder="הזן סיסמה" autocomplete="current-password">
    </div>
    <button class="btn-primary" id="login-btn" onclick="handleLogin()">כניסה לחשבון</button>
    <div class="divider">או</div>
    <div class="register-prompt">
      עדיין אין לך חשבון?<br>
      <a href="amirnet-register.html">לחץ כאן כדי להירשם עם קוד ההזמנה שקיבלת</a>
    </div>
  </div>

</div>
<script>
  const SUPABASE_URL = 'https://ivauncueyedwlthzylnt.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml2YXVuY3VleWVkd2x0aHp5bG50Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5MzQ3MjgsImV4cCI6MjA5MzUxMDcyOH0.Fn7xittXNv8f25V3y_roMbrnGkre_BaunCNzC3hvSVo';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // If already logged in, redirect
  sb.auth.getSession().then(({ data }) => {
    if (data.session) window.location.href = 'amirnet-pro.html';
  });

  async function handleLogin() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('login-btn');
    const errBanner = document.getElementById('error-banner');
    errBanner.classList.remove('show');

    if (!email || !password) {
      errBanner.textContent = 'אנא מלא את כל השדות.';
      errBanner.classList.add('show');
      return;
    }

    btn.textContent = 'מתחבר...';
    btn.classList.add('loading');

    const { data, error } = await sb.auth.signInWithPassword({ email, password });

    if (error) {
      btn.textContent = 'כניסה לחשבון';
      btn.classList.remove('loading');
      errBanner.textContent = 'כתובת האימייל או הסיסמה שגויים. אנא נסה שנית.';
      errBanner.classList.add('show');
      return;
    }

    // Check role in profiles table
    const userId = data.session.user.id;
    const { data: profile } = await sb.from('profiles').select('role').eq('id', userId).single();
    if (profile && profile.role === 'teacher') {
      window.location.href = 'amirnet-teacher.html';
    } else {
      window.location.href = 'amirnet-pro.html';
    }
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
</script>
</body>
</html>
